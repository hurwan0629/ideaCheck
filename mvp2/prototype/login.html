<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>лЎңк·ёмқё вҖ” SYM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --dark: #0f172a;
      --nav-bg: #1e293b;
      --text: #334155;
      --text-light: #64748b;
      --bg: #f8fafc;
      --border: #e2e8f0;
      --accent: #06b6d4;
    }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      background: var(--nav-bg);
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { color: #fff; font-size: 20px; font-weight: 800; text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-center { display: flex; gap: 8px; }
    .nav-center a { color: #94a3b8; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; transition: all 0.2s; }
    .nav-center a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-right { display: flex; gap: 8px; align-items: center; }
    .nav-right a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 6px 14px; border-radius: 6px; }

    .page {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .card-logo {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .card-logo span { color: var(--accent); }
    .card-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 32px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-light);
      transition: all 0.2s;
    }
    .tab.active { background: #fff; color: var(--dark); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--dark);
      transition: border-color 0.2s;
      outline: none;
      font-family: inherit;
    }
    input:focus { border-color: var(--primary); }

    .forgot { text-align: right; margin-top: -8px; margin-bottom: 20px; }
    .forgot a { font-size: 12px; color: var(--text-light); text-decoration: none; }
    .forgot a:hover { color: var(--primary); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-light);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-social {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      font-family: inherit;
      margin-bottom: 10px;
      text-decoration: none;
    }
    .btn-social:hover { background: #f8fafc; }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-light);
    }
    .signup-link a { color: var(--primary); text-decoration: none; font-weight: 600; }

    .panel-signup { display: none; }
    .panel-signup.active, .panel-login.active { display: block; }
  </style>
</head>
<body>

<nav>

  <div class="nav-center">

    <a href="market-share.html">мӢңмһҘ м җмң мңЁ</a>
    <a href="popular-keywords.html">мқёкё° кІҖмғүм–ҙ</a>
  </div>
  <div class="nav-right">
    <a href="mypage.html">л§ҲмқҙнҺҳмқҙм§Җ</a>

      <a href="#" class="btn-social">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        GoogleлЎң кі„мҶҚн•ҳкё°

        м№ҙм№ҙмҳӨлЎң кі„мҶҚн•ҳкё°
      </a>
    </div>

    <div class="panel-signup" id="panel-signup">

      </div>
      <div class="form-group">
        <label>мқҙл©”мқј</label>

      </div>
      <div class="form-group">
        <label>л№„л°ҖлІҲнҳё</label>

      </div>
      <div class="form-group">
        <label>л№„л°ҖлІҲнҳё нҷ•мқё</label>
        <input type="password" placeholder="л№„л°ҖлІҲнҳё мһ¬мһ…л Ҙ">
      </div>
      <button class="btn-primary" onclick="location.href='mypage.html'">нҡҢмӣҗк°Җмһ…</button>
      <div class="signup-link">мқҙлҜё кі„м •мқҙ мһҲмңјмӢ к°Җмҡ”? <a href="#" onclick="switchTab('login')">лЎңк·ёмқё</a></div>
    </div>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  }
</script>

</html>
