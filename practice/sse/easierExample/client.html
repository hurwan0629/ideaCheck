<!DOCTYPE html>
<html lang="ko">
<head>
  <title>sse 초간단 예제</title>
</head>
<body>
  <h1>SSE 테스트</h1>
  <div id="log"></div>

  <script>
    const eventSource = new EventSource("http://localhost:4000/events");

    eventSource.onmessage = (event) => {
      document.getElementById("log").innerHTML += `<p>${event.data}</p>`;
    }
  </script>
</body>
</html>
