services:
  postgres_db:
    image: postgres:16
    container_name: mvp3_postgres
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: testdb
    ports:
    - "15432:5432"
    volumes:
    - "mvp3_postgres:/var/lib/postgresql/data"

volumes:
  mvp3_postgres: